name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend — typecheck + test + docker
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint        # = tsc --noEmit
      - run: npm test
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: false
          tags: astromedia-backend:ci
          load: true

  frontend:
    name: Frontend — typecheck + test + docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run test:unit
      - run: npm run build
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: astromedia-web:ci
          load: true
